name: Daily AI News Summary

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0点 = 北京时间 8点
  workflow_dispatch:  # 手动触发选项

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Fetch AI News and Send to WeChat
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SERVER_CHAN_SENDKEY: ${{ secrets.SERVER_CHAN_SENDKEY }}
        run: python scripts/fetch_ai_news.py
